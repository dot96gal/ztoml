name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Check formatting
        run: mise run fmt-check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Build
        run: mise run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Run tests
        run: mise run test
