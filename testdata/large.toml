[network]
bind_address = "0.0.0.0"
port = 3000
tls_enabled = false
cert_file = "/etc/ssl/certs/app.crt"
key_file = "/etc/ssl/private/app.key"
allowed_origins = ["https://example.com", "https://www.example.com", "https://api.example.com"]
trusted_proxies = ["10.0.0.1", "10.0.0.2", "10.0.0.3"]

[i18n]
default_locale = "en"
supported_locales = ["en", "ja", "fr", "de", "es", "zh", "ko"]
fallback_locale = "en"
timezone = "UTC"

[storage]
type = "s3"
bucket = "my-app-bucket"
region = "us-east-1"
prefix = "data/"
max_upload_size_mb = 100
allowed_types = ["image/jpeg", "image/png", "image/gif", "application/pdf"]

[email]
smtp_host = "smtp.example.com"
smtp_port = 587
smtp_user = "noreply@example.com"
smtp_password = "email-password"
from_name = "My App"
from_address = "noreply@example.com"
use_tls = true

[notifications]
slack_webhook = "https://hooks.slack.com/services/XXX/YYY/ZZZ"
pagerduty_key = "pd-integration-key"
email_on_error = true
error_threshold = 5
cooldown_minutes = 30

[rate_limits]
global_rps = 1000
per_user_rps = 10
per_ip_rps = 50
burst_size = 100
window_seconds = 60

[health_check]
enabled = true
path = "/health"
interval_seconds = 30
timeout_seconds = 5
unhealthy_threshold = 3
healthy_threshold = 2
