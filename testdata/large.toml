# Benchmark test data for ztoml
# This file is used to measure parse performance.

title = "ztoml benchmark"
version = "1.0.0"
description = "A comprehensive TOML benchmark file with various value types"

[server]
host = "localhost"
port = 8080
debug = false
max_connections = 1000
timeout_ms = 30000
read_timeout_ms = 5000
write_timeout_ms = 5000
idle_timeout_ms = 60000

[database]
host = "db.example.com"
port = 5432
name = "mydb"
user = "admin"
password = "s3cr3t"
pool_size = 10
max_idle = 5
connect_timeout = 10
max_lifetime_ms = 3600000

[database.replica]
host = "replica.example.com"
port = 5432
pool_size = 5

[logging]
level = "info"
format = "json"
output = "stdout"
file = "/var/log/app.log"
max_size_mb = 100
max_backups = 7
max_age_days = 30
compress = true

[cache]
enabled = true
host = "cache.example.com"
port = 6379
db = 0
password = ""
pool_size = 5
ttl_seconds = 3600
max_memory_mb = 512

[auth]
secret = "my-very-long-secret-key-for-jwt-signing"
expiry_hours = 24
refresh_expiry_hours = 168
algorithm = "HS256"
issuer = "myapp"

[auth.providers]
google_client_id = "google-client-id.apps.googleusercontent.com"
github_client_id = "github-client-id"

[features]
enable_analytics = true
enable_notifications = true
enable_beta = false
enable_dark_mode = true
maintenance_mode = false
rate_limiting = true
max_requests_per_minute = 100

[metrics]
enabled = true
host = "metrics.example.com"
port = 9090
path = "/metrics"
interval_seconds = 15

